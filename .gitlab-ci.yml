build:
  # Pinned (not floating "gcc") so a tag update upstream can't silently
  # change the compiler this pipeline builds with.
  image: gcc:14
  stage: build
  # x86-64-only: the benchmark uses <x86intrin.h> (__rdtsc, _mm_pause), so the
  # runner executing this job must be an amd64 host.
  script:
    - g++ -O3 -std=c++23 -pthread smt_pingpong.cpp -o smt_pingpong
    - g++ -O3 -std=c++23 -pthread sibling_noise.cpp -o sibling_noise
    # sibling_analyze --test is pure-logic (no llvm-mca needed), so it runs in
    # this plain gcc image; the compile/mca driver path is exercised separately
    # on a box that has llvm-mca.
    - g++ -O3 -std=c++23 sibling_analyze.cpp -o sibling_analyze
    - ./smt_pingpong --test
    - ./sibling_noise --test
    - ./sibling_analyze --test
